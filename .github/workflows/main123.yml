name: Build & Publish Release APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  Gradle:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (For Web App Conversion)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Convert Web HTML to Android Project
        run: |
          mkdir -p www
          
          cp code_artifact.html www/index.html 2>/dev/null || cp index.html www/index.html 2>/dev/null || true
          npm init -y
          npm i @capacitor/core @capacitor/cli @capacitor/android
          npx cap init --name="SmartBahiKhata" --id="com.codecare.bahikhata" --web-dir="www"
          npx cap add android
          npx cap sync

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Make Gradle executable
        run: |
          cd android
          chmod +x ./gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Releasing using Hub
        uses: sangatdesai/release-apk@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_FOLDER: android/app
